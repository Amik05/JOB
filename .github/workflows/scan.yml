name: J*B Inbox Scan

on:
  # Disable schedule loop for now
  # schedule:
  #   # Runs every 2 hours
  #   - cron: "0 */2 * * *"
  workflow_dispatch:
    # Allows you to trigger a manual scan from the GitHub Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run J*B scan
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
        run: python run_once.py
